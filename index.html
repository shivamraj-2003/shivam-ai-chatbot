<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shivam AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #08080f;
      --surface:     #111118;
      --surface2:    #18181f;
      --surface3:    #1f1f28;
      --border:      rgba(255,255,255,0.06);
      --border2:     rgba(255,255,255,0.11);
      --accent:      #4f8ef7;
      --accent-h:    #6ba0f9;
      --accent-glow: rgba(79,142,247,0.15);
      --text:        #e8e8ec;
      --text2:       #a8a8b4;
      --muted:       #64647a;
      --ai-bg:       #111118;
      --green:       #34d399;
      --code-bg:     #0c0c13;
      --font:        'Inter', sans-serif;
      --mono:        'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 15px; line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .app {
      display: flex; flex-direction: column;
      height: 100vh; max-width: 860px;
      margin: 0 auto; padding: 0 20px;
    }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid var(--border);
      flex-shrink: 0; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 11px; }
    .logo-mark {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, #1d4ed8, #4f8ef7);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 18px rgba(79,142,247,0.35);
    }
    .logo-mark svg { width: 20px; height: 20px; fill: #fff; }
    .logo-text { display: flex; flex-direction: column; }
    .logo-name {
      font-size: 16px; font-weight: 700; letter-spacing: -0.4px; line-height: 1.2;
      background: linear-gradient(90deg, #e8e8ec, #8ab4f8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-sub { font-size: 10px; color: var(--muted); letter-spacing: .4px; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .model-tag {
      font-size: 11px; font-weight: 500; color: var(--accent);
      background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.22);
      border-radius: 20px; padding: 3px 10px;
    }
    .pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 11px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 2.4s ease infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .clear-btn {
      display: flex; align-items: center; gap: 5px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: 11px; font-family: var(--font);
      padding: 5px 13px; border-radius: 8px; cursor: pointer; transition: all .2s;
    }
    .clear-btn svg { width: 12px; height: 12px; fill: currentColor; }
    .clear-btn:hover { border-color: var(--border2); color: var(--text); }

    /* Chat area */
    .chat-wrap { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    #chat-box {
      flex: 1; overflow-y: auto; padding: 24px 0 8px;
      display: flex; flex-direction: column; gap: 4px;
      scrollbar-width: thin; scrollbar-color: var(--surface3) transparent;
    }
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    /* Scroll button */
    #scroll-btn {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      display: none; align-items: center; gap: 6px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text2); font-size: 12px; font-family: var(--font);
      padding: 6px 16px; border-radius: 20px; cursor: pointer;
      transition: all .2s; box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 10;
    }
    #scroll-btn.show { display: flex; }
    #scroll-btn:hover { background: var(--surface3); color: var(--text); }
    #scroll-btn svg { width: 13px; height: 13px; fill: currentColor; }

    /* Welcome */
    @keyframes rise { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px; padding: 36px 16px 20px;
      text-align: center; animation: rise .5s ease;
    }
    .welcome-icon-wrap { position: relative; width: 76px; height: 76px; margin-bottom: 4px; }
    .ring, .ring2 {
      position: absolute; border-radius: 24px;
      border: 1px solid rgba(79,142,247,0.2);
    }
    .ring  { inset: 0;    animation: spin 14s linear infinite; }
    .ring2 { inset: -12px; border-radius: 32px; border-color: rgba(79,142,247,0.08); animation: spin 22s linear infinite reverse; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .welcome-icon {
      width: 76px; height: 76px; border-radius: 24px;
      background: linear-gradient(135deg, #1e3a8a, #2563eb, #4f8ef7);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 36px rgba(79,142,247,0.35);
    }
    .welcome-icon svg { width: 38px; height: 38px; fill: #fff; }
    .welcome h2 {
      font-size: 27px; font-weight: 700; letter-spacing: -0.6px;
      background: linear-gradient(135deg, #e8e8ec 30%, #8ab4f8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .welcome p { font-size: 14px; color: var(--text2); max-width: 360px; line-height: 1.7; }

    /* Suggestion cards */
    .sugs-wrap { flex-shrink: 0; padding: 0 0 14px; }
    .cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
    .card {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 12px; padding: 12px 14px; cursor: pointer;
      transition: all .2s; text-align: left;
      display: flex; flex-direction: column; gap: 3px;
    }
    .card:hover { border-color: var(--accent); background: var(--accent-glow); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(79,142,247,0.12); }
    .card-icon { font-size: 19px; line-height: 1; margin-bottom: 2px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .card-sub { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* Messages */
    .msg { display: flex; gap: 10px; padding: 3px 0; animation: rise .22s ease; }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; margin-top: 4px;
    }
    .msg.user .avatar { background: linear-gradient(135deg,#1d4ed8,#4f8ef7); color: #fff; }
    .msg.ai .avatar { background: var(--surface2); border: 1px solid var(--border2); }
    .msg.ai .avatar svg { width: 15px; height: 15px; fill: var(--accent); }
    .msg-body { display: flex; flex-direction: column; gap: 3px; max-width: 80%; }
    .msg.user .msg-body { align-items: flex-end; }
    .msg-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); padding: 0 4px; }
    .msg.user .msg-meta { flex-direction: row-reverse; }
    .msg-name { font-weight: 600; }
    .model-chip {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 500;
      padding: 1px 7px; border-radius: 10px;
      border: 1px solid; letter-spacing: .2px;
    }
    .model-chip.flash  { color: #60a5fa; border-color: rgba(96,165,250,.25); background: rgba(96,165,250,.07); }
    .model-chip.pro    { color: #c084fc; border-color: rgba(192,132,252,.25); background: rgba(192,132,252,.07); }
    .model-chip.legacy { color: #94a3b8; border-color: rgba(148,163,184,.2);  background: rgba(148,163,184,.06); }
    .bubble {
      padding: 12px 16px; border-radius: 18px;
      font-size: 14px; line-height: 1.75; word-break: break-word;
      position: relative;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg,#1b2d5a,#1e3267);
      border: 1px solid rgba(79,142,247,0.28);
      border-bottom-right-radius: 4px; color: #dae4ff;
    }
    .msg.ai .bubble {
      background: var(--ai-bg); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; color: var(--text);
    }
    .bubble.error { background: rgba(248,113,113,0.07); border-color: rgba(248,113,113,0.22); color: #fca5a5; }

    /* Copy message button */
    .copy-msg-btn {
      display: none; position: absolute; top: 6px; right: 8px;
      align-items: center; gap: 4px;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--muted); font-size: 10px; font-family: var(--font);
      padding: 2px 8px; border-radius: 6px; cursor: pointer; transition: all .15s;
    }
    .copy-msg-btn svg { width: 10px; height: 10px; fill: currentColor; }
    .bubble:hover .copy-msg-btn { display: flex; }
    .copy-msg-btn:hover { color: var(--text); border-color: var(--accent); }

    /* Typing dots */
    .typing { display: flex; align-items: center; gap: 5px; padding: 13px 16px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .4; animation: bob 1.2s ease infinite; }
    .typing span:nth-child(2){animation-delay:.18s}
    .typing span:nth-child(3){animation-delay:.36s}
    @keyframes bob { 0%,80%,100%{transform:translateY(0);opacity:.3} 40%{transform:translateY(-6px);opacity:1} }

    /* Markdown */
    .md h1,.md h2,.md h3 { font-weight: 700; margin: 12px 0 4px; color: var(--text); }
    .md h1 { font-size: 18px; letter-spacing: -0.3px; }
    .md h2 { font-size: 16px; }
    .md h3 { font-size: 14px; }
    .md p { margin: 5px 0; }
    .md ul, .md ol { padding-left: 20px; margin: 5px 0; }
    .md li { margin: 3px 0; }
    .md strong { font-weight: 700; color: #fff; }
    .md em { font-style: italic; color: var(--text2); }
    .md code {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.08);
      padding: 1px 6px; border-radius: 5px;
      font-family: var(--mono); font-size: 12.5px; color: #c9d8ff;
    }
    .md blockquote {
      border-left: 3px solid var(--accent); padding: 4px 12px; margin: 8px 0;
      color: var(--text2); font-style: italic;
      background: rgba(79,142,247,0.05); border-radius: 0 6px 6px 0;
    }
    .md hr { border: none; border-top: 1px solid var(--border2); margin: 12px 0; }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }

    /* Code blocks */
    .code-block { margin: 10px 0; border-radius: 12px; background: var(--code-bg); border: 1px solid rgba(255,255,255,0.08); overflow: hidden; }
    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .code-lang { font-size: 11px; color: var(--muted); font-family: var(--mono); font-weight: 500; }
    .copy-code-btn {
      display: flex; align-items: center; gap: 5px;
      background: transparent; border: 1px solid var(--border2);
      color: var(--muted); font-size: 11px; font-family: var(--font);
      padding: 3px 10px; border-radius: 6px; cursor: pointer; transition: all .15s;
    }
    .copy-code-btn svg { width: 11px; height: 11px; fill: currentColor; }
    .copy-code-btn:hover { color: var(--text); border-color: var(--accent); }
    .copy-code-btn.copied { color: var(--green); border-color: var(--green); }
    .code-block pre {
      padding: 14px; overflow-x: auto; margin: 0;
      font-family: var(--mono); font-size: 13px; line-height: 1.65;
      color: #c8d3f5; white-space: pre;
      scrollbar-width: thin; scrollbar-color: var(--surface2) transparent;
    }

    /* Input */
    .input-section { flex-shrink: 0; padding: 10px 0 18px; }
    .input-box {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: 18px; padding: 12px 14px; transition: border-color .2s, box-shadow .2s;
    }
    .input-box:focus-within { border-color: rgba(79,142,247,0.4); box-shadow: 0 0 0 3px rgba(79,142,247,0.07); }
    #q-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: var(--font); font-size: 14px;
      line-height: 1.55; resize: none; min-height: 22px; max-height: 130px; overflow-y: auto;
    }
    #q-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .2s;
      box-shadow: 0 2px 12px rgba(79,142,247,0.32);
    }
    #send-btn:hover { background: var(--accent-h); transform: scale(1.06); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; box-shadow: none; }
    #send-btn svg { width: 15px; height: 15px; fill: white; }
    .input-foot {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-top: 8px; font-size: 11px; color: var(--muted);
    }
    .input-foot kbd {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 4px; padding: 1px 6px; font-size: 10px; font-family: var(--mono);
    }

    /* Responsive */
    @media(max-width:640px) {
      .app { padding: 0 12px; }
      .cards { grid-template-columns: repeat(2,1fr); }
      .msg-body { max-width: 90%; }
      .bubble { font-size: 13.5px; }
      .model-tag, .logo-sub { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">Shivam AI</div>
      </div>
    </div>
    <div class="header-right">
      <button class="clear-btn" onclick="clearChat()">
        <svg viewBox="0 0 24 24"><path d="M19 13H13v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        New chat
      </button>
      <div class="pill"><span class="dot"></span>Online</div>
    </div>
  </header>

  <div class="chat-wrap">
    <div id="chat-box">
      <div class="welcome" id="welcome">
        <div class="welcome-icon-wrap">
          <div class="ring"></div>
          <div class="ring2"></div>
          <div class="welcome-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </div>
        </div>
        <h2>Hello, I'm Shivam AI</h2>
        <p>Ask me anything — code, concepts, ideas. Hindi, English or Hinglish, all welcome.</p>
      </div>
    </div>
    <button id="scroll-btn" onclick="scrollToBottom()">
      <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
      Scroll down
    </button>
  </div>

  <div class="sugs-wrap" id="sugs-wrap">
    <div class="cards">
      <button class="card" onclick="fillQ('Explain Python for a complete beginner with examples')">
        <div class="card-icon">🐍</div>
        <div class="card-title">Python basics</div>
        <div class="card-sub">Beginner-friendly intro</div>
      </button>
      <button class="card" onclick="fillQ('What is the difference between AI and Machine Learning?')">
        <div class="card-icon">🤖</div>
        <div class="card-title">AI vs ML</div>
        <div class="card-sub">Clear comparison</div>
      </button>
      <button class="card" onclick="fillQ('Write a REST API in Node.js with Express, with CRUD routes')">
        <div class="card-icon">🚀</div>
        <div class="card-title">Node.js API</div>
        <div class="card-sub">Express CRUD example</div>
      </button>
      <button class="card" onclick="fillQ('Explain SQL JOINs with examples — INNER, LEFT, RIGHT')">
        <div class="card-icon">🗄️</div>
        <div class="card-title">SQL JOINs</div>
        <div class="card-sub">With clear examples</div>
      </button>
      <button class="card" onclick="fillQ('How do I learn React JS step by step as a beginner?')">
        <div class="card-icon">⚛️</div>
        <div class="card-title">Learn React</div>
        <div class="card-sub">Step-by-step roadmap</div>
      </button>
      <button class="card" onclick="fillQ('What are the best practices for writing clean maintainable code?')">
        <div class="card-icon">✨</div>
        <div class="card-title">Clean code</div>
        <div class="card-sub">Best practices guide</div>
      </button>
    </div>
  </div>

  <div class="input-section">
    <div class="input-box">
      <textarea id="q-input" placeholder="Ask anything…" rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="askQuestion()" title="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="input-foot">
      <span><kbd>Enter</kbd> send</span>
      <span>·</span>
      <span><kbd>Shift+Enter</kbd> new line</span>
    </div>
  </div>

</div>

<script>
const API_URL = '/api/chat';
const SYSTEM  = { parts: [{ text: 'You are Shivam AI, a smart helpful assistant powered by Gemini. Reply in the same language the user writes in (Hindi, English, or Hinglish). Be clear, concise, and friendly. For code questions always include runnable examples. Use Markdown formatting where it helps.' }] };

const history  = [];
let   loading  = false;
let   codeIdx  = 0;

const chatBox  = document.getElementById('chat-box');
const qInput   = document.getElementById('q-input');
const sendBtn  = document.getElementById('send-btn');
const sugsWrap = document.getElementById('sugs-wrap');
const scrollBtn= document.getElementById('scroll-btn');

chatBox.addEventListener('scroll', () => {
  const atBottom = chatBox.scrollHeight - chatBox.scrollTop - chatBox.clientHeight < 80;
  scrollBtn.classList.toggle('show', !atBottom && chatBox.scrollHeight > chatBox.clientHeight + 120);
});
function scrollToBottom() { chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' }); }

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 130) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askQuestion(); } }
function fillQ(text) { qInput.value = text; autoResize(qInput); qInput.focus(); sugsWrap.style.display = 'none'; }

function clearChat() {
  history.length = 0;
  chatBox.querySelectorAll('.msg').forEach(m => m.remove());
  if (!document.getElementById('welcome')) {
    const w = document.createElement('div');
    w.className = 'welcome'; w.id = 'welcome';
    w.innerHTML = '<div class="welcome-icon-wrap"><div class="ring"></div><div class="ring2"></div><div class="welcome-icon"><svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div></div><h2>Hello, I\'m Shivam AI</h2><p>Ask me anything — code, concepts, ideas.</p>';
    chatBox.appendChild(w);
  }
  sugsWrap.style.display = '';
}

/* ── Markdown renderer ── */
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderMd(raw) {
  const cbs = {};
  let t = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const id = '__CB' + (codeIdx++) + '__';
    const safeCode = esc(code.trimEnd());
    const label = lang || 'code';
    const safeRaw = code.trimEnd().replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n');
    cbs[id] = '<div class="code-block"><div class="code-header"><span class="code-lang">' + label + '</span>'
      + '<button class="copy-code-btn" onclick="cpCode(this)" data-c="' + safeRaw + '">'
      + '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>Copy</button></div>'
      + '<pre>' + safeCode + '</pre></div>';
    return '\n\n' + id + '\n\n';
  });

  t = esc(t);
  // restore code block placeholders (esc won't touch them since they have no HTML chars)
  t = t
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
    .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g,     '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,         '<em>$1</em>')
    .replace(/`([^`\n]+)`/g,       '<code>$1</code>')
    .replace(/^&gt; (.+)$/gm,      '<blockquote>$1</blockquote>')
    .replace(/^---$/gm,            '<hr>')
    .replace(/^[-*] (.+)$/gm,      '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,     '<li>$1</li>');

  t = t.replace(/((<li>[^\n]*<\/li>\n?)+)/g, '<ul>$1</ul>');

  Object.keys(cbs).forEach(id => { t = t.replace(id, cbs[id]); });

  t = t.split(/\n{2,}/).map(chunk => {
    chunk = chunk.trim();
    if (!chunk) return '';
    if (/^<(h[1-6]|ul|ol|blockquote|hr|div)/.test(chunk)) return chunk;
    return '<p>' + chunk.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');

  return t;
}

function cpCode(btn) {
  const code = btn.dataset.c.replace(/\\n/g,'\n').replace(/\\"/g,'"').replace(/\\\\/g,'\\');
  navigator.clipboard.writeText(code).then(() => {
    const orig = btn.innerHTML; btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('copied'); }, 2000);
  });
}
function cpMsg(btn) {
  const text = btn.closest('.bubble').innerText.replace(/^Copy$/m,'').trim();
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.innerHTML; btn.textContent = 'Copied!';
    setTimeout(() => { btn.innerHTML = orig; }, 1800);
  });
}

const COPY_ICON = '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>';

const MODEL_INFO = {
  'gemini-2.5-pro':        { icon: '🧠', label: '2.5 Pro',    cls: 'pro'    },
  'gemini-2.0-flash':      { icon: '⚡', label: '2.0 Flash',  cls: 'flash'  },
  'gemini-2.0-flash-lite': { icon: '🪶', label: 'Flash Lite', cls: 'legacy' },
};

function modelChip(modelId) {
  const m = MODEL_INFO[modelId];
  if (!m) return '';
  return '<span class="model-chip ' + m.cls + '">' + m.icon + ' ' + m.label + '</span>';
}

function setHeaderModel(modelId) {
  const m = MODEL_INFO[modelId]; if (!m) return;
  const el = document.querySelector('.model-tag');
  if (el) el.textContent = m.icon + ' Gemini ' + m.label;
}

function addMsg(role, text, isTyping, modelId) {
  const w = document.getElementById('welcome'); if (w) w.remove();
  const isUser = role === 'user';
  const row = document.createElement('div'); row.className = 'msg ' + (isUser ? 'user' : 'ai');

  const av = document.createElement('div'); av.className = 'avatar';
  av.innerHTML = isUser ? 'S' : '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';

  const body = document.createElement('div'); body.className = 'msg-body';
  const meta = document.createElement('div'); meta.className = 'msg-meta';
  const t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  // For AI messages: if modelId unknown yet (typing), leave a placeholder span
  const chipHtml = (!isUser && modelId) ? modelChip(modelId)
                 : (!isUser)            ? '<span id="pending-model-chip"></span>'
                 : '';
  meta.innerHTML = '<span class="msg-name">' + (isUser ? 'You' : 'Shivam AI') + '</span>' + chipHtml + '<span>' + t + '</span>';

  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isUser ? '' : ' md');
  if (isTyping) {
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    bubble.id = 'typing-bubble';
  } else if (isUser) {
    bubble.textContent = text;
  } else {
    bubble.innerHTML = renderMd(text) + '<button class="copy-msg-btn" onclick="cpMsg(this)">' + COPY_ICON + 'Copy</button>';
  }

  body.appendChild(meta); body.appendChild(bubble);
  row.appendChild(av); row.appendChild(body);
  chatBox.appendChild(row);
  chatBox.scrollTop = chatBox.scrollHeight;
  return bubble;
}

async function askQuestion() {
  if (loading) return;
  const q = qInput.value.trim(); if (!q) return;

  sugsWrap.style.display = 'none';
  addMsg('user', q, false, null);
  history.push({ role: 'user', parts: [{ text: q }] });
  qInput.value = ''; qInput.style.height = 'auto';
  loading = true; sendBtn.disabled = true;
  addMsg('ai', '', true, null);

  try {
    const res  = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: history, systemInstruction: SYSTEM }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || 'HTTP ' + res.status);

    const answer  = data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response. Please try again.';
    const modelId = data._model || 'gemini-2.0-flash';
    history.push({ role: 'model', parts: [{ text: answer }] });
    setHeaderModel(modelId);

    const tb = document.getElementById('typing-bubble');
    if (tb) {
      // Fill in the model chip placeholder now that we know which model answered
      const placeholder = document.getElementById('pending-model-chip');
      if (placeholder) placeholder.outerHTML = modelChip(modelId);

      tb.id = '';
      tb.innerHTML = renderMd(answer) + '<button class="copy-msg-btn" onclick="cpMsg(this)">' + COPY_ICON + 'Copy</button>';
    }

  } catch (err) {
    const tb = document.getElementById('typing-bubble');
    if (tb) { tb.id = ''; tb.classList.add('error'); tb.textContent = 'Error: ' + (err.message || 'Something went wrong.'); }
  }

  loading = false; sendBtn.disabled = false;
  chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
}
</script>
